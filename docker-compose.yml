version: '3.8'

services:
  # Oracle Database (using Oracle XE for local development)
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: settlement-oracle
    environment:
      TZ: Asia/Shanghai
      ORACLE_PASSWORD: settlement123
      APP_USER: settlement
      APP_USER_PASSWORD: settlement123
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # IBM MQ (with built-in Prometheus metrics on port 9157)
  ibmmq:
    image: icr.io/ibm-messaging/mq:latest
    container_name: settlement-mq
    environment:
      LICENSE: accept
      MQ_QMGR_NAME: SETTLEMENT_QM
      MQ_APP_PASSWORD: passw0rd
      MQ_ADMIN_PASSWORD: passw0rd
      MQ_ENABLE_METRICS: "true"
    ports:
      - "1414:1414"
      - "9443:9443"
      - "9157:9157"
    volumes:
      - mq-data:/mnt/mqm
      - ./docker/mq/config.mqsc:/etc/mqm/config.mqsc
    healthcheck:
      test: ["CMD", "chkmqhealthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  # WebSphere Liberty (with IBM MQ Resource Adapter for MDB activation)
  liberty:
    build:
      context: .
      dockerfile: docker/liberty/Dockerfile
    container_name: settlement-liberty
    ports:
      - "9080:9080"
      - "9444:9443"
    volumes:
      - ./docker/liberty/server.xml:/config/server.xml
      - ./settlement-ear/target/bond-settlement.ear:/config/apps/bond-settlement.ear
      - ./docker/liberty/jdbc/ojdbc11.jar:/opt/ibm/wlp/usr/shared/resources/jdbc/ojdbc11.jar
    depends_on:
      oracle:
        condition: service_healthy
      ibmmq:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      JVM_ARGS: -Duser.timezone=Asia/Shanghai
      ORACLE_HOST: oracle
      ORACLE_PORT: 1521
      MQ_HOST: ibmmq
      MQ_PORT: 1414

  # ==================== Monitoring Stack (profile: monitoring) ====================

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: settlement-prometheus
    profiles: ["monitoring"]
    volumes:
      - ./docker/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - liberty
      - ibmmq
    environment:
      TZ: Asia/Shanghai

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: settlement-grafana
    profiles: ["monitoring"]
    volumes:
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      TZ: Asia/Shanghai
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"

volumes:
  oracle-data:
  mq-data:
  prometheus-data:
  grafana-data:
