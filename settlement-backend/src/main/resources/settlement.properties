# Webhook alert configuration for settlement retry failures
settlement.alert.webhook.enabled=false
settlement.alert.webhook.url=

# MQ monitoring connection (used by MqMonitorService for PCF admin queries)
# These are independent of the JCA resource adapter connection so monitoring
# remains operational even if the RA is unhealthy.
# Uses admin channel/user for PCF command authority.
mq.monitor.host=${MQ_HOST:localhost}
mq.monitor.port=${MQ_PORT:1414}
mq.monitor.channel=DEV.ADMIN.SVRCONN
mq.monitor.queueManager=SETTLEMENT_QM
mq.monitor.user=admin
mq.monitor.password=passw0rd
