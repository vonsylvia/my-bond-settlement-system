openapi: 3.0.3
info:
  title: Bond Settlement System API
  description: REST API for SWIFT bond settlement instruction management
  version: 1.0.0
  contact:
    name: Settlement Team

servers:
  - url: http://localhost:9080/settlement
    description: WebSphere local development

paths:
  /api/settlement:
    post:
      summary: Create a new settlement instruction
      description: Submits a settlement instruction, builds MT541, and sends to SWIFT via IBM MQ
      operationId: createSettlement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettlementRequest'
            example:
              isin: "US0378331005"
              settlementDate: "2026-05-10"
              quantity: 1000000.00
              counterparty: "Goldman Sachs"
              bicCode: "GOLDUS33XXX"
              direction: "BUY"
              accountId: "ACC-001"
      responses:
        '202':
          description: Settlement instruction accepted for async processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: List settlement instructions
      description: Returns a paginated list of settlement instructions
      operationId: listSettlements
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
          description: Page number (0-based)
        - name: size
          in: query
          schema:
            type: integer
            default: 20
          description: Page size
      responses:
        '200':
          description: Paginated list of settlements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedSettlementResponse'

  /api/settlement/{tradeRef}:
    get:
      summary: Get settlement instruction by trade reference
      operationId: getSettlement
      parameters:
        - name: tradeRef
          in: path
          required: true
          schema:
            type: string
          description: Unique trade reference identifier
      responses:
        '200':
          description: Settlement instruction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementResponse'
        '404':
          description: Settlement instruction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/settlement/{tradeRef}/retry:
    post:
      summary: Manually retry a failed settlement instruction
      description: |
        Re-submits a FAILED settlement instruction for async processing.
        Only instructions in FAILED status can be retried.
      operationId: retrySettlement
      parameters:
        - name: tradeRef
          in: path
          required: true
          schema:
            type: string
          description: Unique trade reference identifier
      responses:
        '202':
          description: Settlement instruction accepted for retry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementResponse'
        '404':
          description: Settlement instruction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Instruction not in a retryable state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/holdings:
    get:
      summary: Get bond holdings
      operationId: getHoldings
      parameters:
        - name: accountId
          in: query
          required: false
          schema:
            type: string
          description: Filter by account ID
      responses:
        '200':
          description: List of bond holdings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HoldingResponse'

  /api/positions/reconcile:
    post:
      summary: Incremental position reconciliation
      description: |
        Checks only positions that have had movements since the last daily-close snapshot.
        Falls back to a full scan if no snapshot exists yet. Does not persist a snapshot.
      operationId: reconcilePositions
      responses:
        '200':
          description: Reconciliation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationResult'
              example:
                reconciledAt: "2026-05-11T22:08:00"
                type: "INCREMENTAL"
                totalPositions: 3
                discrepancyCount: 1
                consistent: false
                discrepancies:
                  - accountId: "ACC-001"
                    isin: "US0378331005"
                    cachedBalance: 1000000.00
                    ledgerBalance: 900000.00
                    difference: 100000.00

  /api/positions/daily-close:
    post:
      summary: End-of-day full reconciliation with snapshot
      description: |
        Full scan of all positions comparing cached balances against the ledger.
        Persists a RECONCILIATION_SNAPSHOT record that becomes the new baseline
        for subsequent incremental reconciliation calls. Typically triggered by
        an external job scheduler (cron, Autosys, etc.) at close of business.
      operationId: dailyClose
      responses:
        '200':
          description: Full reconciliation result (snapshot persisted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationResult'
              example:
                reconciledAt: "2026-05-11T18:00:00"
                type: "DAILY_CLOSE"
                totalPositions: 150
                discrepancyCount: 0
                consistent: true
                discrepancies: []

  /api/translation/translate:
    post:
      summary: Translate a SWIFT message between MT and MX formats
      description: |
        Accepts a raw SWIFT FIN (MT) or ISO 20022 (MX) message and translates it to the
        opposite format. Uses the canonical pivot model: detect source → parse to canonical →
        build target format. If targetStandard is omitted, auto-detects and translates to
        the opposite standard (MT→MX or MX→MT).
      operationId: translateMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranslationRequest'
            example:
              rawPayload: "{1:F01OWNRBICXXXX0000000000}{2:O5411200260515GOLDUS33XXX00000000002605150000N}{4:\r\n:20C::SEME//TR-EXAMPLE-001\r\n:23G:NEWM\r\n:98A::SETT//20260515\r\n:35B:ISIN US0378331005\r\n:36B::SETT//UNIT/1000000.00\r\n:95P::DEAG//GOLDUS33XXX\r\n:97A::SAFE//ACC-001\r\n-}"
              targetStandard: "MX"
      responses:
        '200':
          description: Translation result with source/target metadata and canonical summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationResponse'
        '400':
          description: Validation error (blank payload, same standard, unparseable message)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/translation/detect:
    post:
      summary: Detect the format and type of a SWIFT message
      description: |
        Lightweight endpoint that identifies the message standard (MT or MX),
        message type (e.g. MT541, sese.023.001.09), and trade reference
        without performing a full translation.
      operationId: detectMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranslationRequest'
      responses:
        '200':
          description: Detected format information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/settlement/{tradeRef}/messages:
    get:
      summary: Get SWIFT messages for a settlement instruction
      description: |
        Returns all SWIFT messages (outbound and inbound, both original and translated copies)
        associated with a given trade reference. Messages are ordered by creation time.
      operationId: getMessages
      parameters:
        - name: tradeRef
          in: path
          required: true
          schema:
            type: string
          description: Trade reference identifier
      responses:
        '200':
          description: List of SWIFT messages for the instruction
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SwiftMessageResponse'

  /api/counterparty:
    get:
      summary: List all active counterparty capabilities
      description: Returns all registered counterparties with their MT/MX routing preferences
      operationId: listCounterparties
      responses:
        '200':
          description: List of counterparty capabilities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CounterpartyCapabilityResponse'

    post:
      summary: Register a new counterparty capability
      operationId: createCounterparty
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CounterpartyCapabilityRequest'
            example:
              bicCode: "HSBCHKHHXXX"
              participantName: "HSBC Hong Kong"
              supportedStandard: "DUAL"
              preferredStandard: "MX"
      responses:
        '201':
          description: Counterparty registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CounterpartyCapabilityResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/counterparty/{bicCode}:
    get:
      summary: Get counterparty capability by BIC
      operationId: getCounterparty
      parameters:
        - name: bicCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Counterparty capability details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CounterpartyCapabilityResponse'
        '404':
          description: Counterparty not found

    put:
      summary: Update counterparty capability
      operationId: updateCounterparty
      parameters:
        - name: bicCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CounterpartyCapabilityRequest'
      responses:
        '200':
          description: Counterparty updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CounterpartyCapabilityResponse'
        '404':
          description: Counterparty not found

    delete:
      summary: Deactivate a counterparty (soft delete)
      operationId: deactivateCounterparty
      parameters:
        - name: bicCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Counterparty deactivated
        '404':
          description: Counterparty not found

  /api/mq/health:
    get:
      summary: IBM MQ connection health check
      description: Tests basic MQ connectivity by creating and closing a JMS session
      operationId: mqHealth
      responses:
        '200':
          description: MQ connection status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MqHealthResponse'

  /api/mq/test-mdb:
    post:
      summary: Send test MT548 to verify MDB processing
      description: |
        Sends a test MT548 reply message to SWIFT.REPLY.QUEUE.
        The SwiftReplyMDB should pick it up and process it through ReconciliationService.
      operationId: testMdb
      parameters:
        - name: correlationId
          in: query
          required: false
          schema:
            type: string
            default: "TEST-MDB-001"
          description: Correlation ID for the test message
      responses:
        '200':
          description: Test message sent (or error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MqTestMdbResponse'

  /api/mq/stats:
    get:
      summary: MDB processing metrics and queue status
      description: |
        Returns in-memory MDB processing counters, MT548 reconciliation metrics
        (reset on restart), and live queue statistics from IBM MQ via PCF admin
        commands. Covers SWIFT.REPLY.QUEUE, SWIFT.SEND.QUEUE, and SWIFT.DLQ.
      operationId: mqStats
      responses:
        '200':
          description: MDB metrics and queue status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MqStatsResponse'
              example:
                timestamp: "2026-05-10T07:10:00Z"
                mdb:
                  totalReceived: 1234
                  totalSuccess: 1230
                  totalFailed: 4
                  lastReceivedAt: "2026-05-10T07:09:55Z"
                  lastSuccessAt: "2026-05-10T07:09:55Z"
                  lastFailedAt: "2026-05-10T06:30:12Z"
                reconciliation:
                  totalProcessed: 1230
                  totalMatched: 1200
                  totalFailed: 15
                  totalPending: 10
                  totalUnknown: 2
                  totalUnmatched: 3
                  lastProcessedAt: "2026-05-10T07:09:55Z"
                  lastUnknownAt: "2026-05-10T06:15:22Z"
                queues:
                  SWIFT.REPLY.QUEUE:
                    currentDepth: 3
                    maxDepth: 10000
                    openInputCount: 5
                    openOutputCount: 1
                    lastPutDateTime: "2026-05-10 07:09:55"
                    lastGetDateTime: "2026-05-10 07:09:55"
                  SWIFT.SEND.QUEUE:
                    currentDepth: 0
                    maxDepth: 10000
                    openInputCount: 0
                    openOutputCount: 1
                  SWIFT.DLQ:
                    currentDepth: 0
                    maxDepth: 50000
                    openInputCount: 0
                    openOutputCount: 0

components:
  schemas:
    SettlementRequest:
      type: object
      required:
        - isin
        - settlementDate
        - quantity
        - counterparty
        - bicCode
        - direction
        - accountId
      properties:
        isin:
          type: string
          pattern: '^[A-Z]{2}[A-Z0-9]{9}[0-9]$'
          description: International Securities Identification Number
          example: "US0378331005"
        settlementDate:
          type: string
          format: date
          description: Settlement date (must be today or future)
          example: "2026-05-10"
        quantity:
          type: number
          format: decimal
          minimum: 0.01
          description: Number of securities
          example: 1000000.00
        counterparty:
          type: string
          maxLength: 100
          description: Counterparty name
          example: "Goldman Sachs"
        bicCode:
          type: string
          pattern: '^[A-Z]{6}[A-Z0-9]{2}([A-Z0-9]{3})?$'
          description: BIC/SWIFT code of counterparty
          example: "GOLDUS33XXX"
        direction:
          type: string
          enum: [BUY, SELL]
          description: Trade direction
          example: "BUY"
        accountId:
          type: string
          maxLength: 50
          description: Internal safekeeping account identifier
          example: "ACC-001"
        preferredStandard:
          type: string
          enum: [MT, MX]
          description: Preferred SWIFT messaging standard (defaults to MT if omitted)
          example: "MT"

    SettlementResponse:
      type: object
      properties:
        tradeRef:
          type: string
          description: Unique trade reference
          example: "TR-A1B2C3D4E5F6"
        isin:
          type: string
          example: "US0378331005"
        settlementDate:
          type: string
          format: date
          example: "2026-05-10"
        quantity:
          type: number
          example: 1000000.00
        counterparty:
          type: string
          example: "Goldman Sachs"
        bicCode:
          type: string
          example: "GOLDUS33XXX"
        direction:
          type: string
          enum: [BUY, SELL]
          example: "BUY"
        status:
          type: string
          enum: [PENDING, SUBMITTING, SENT, MATCHED, FAILED, RETRYING, CANCELLED]
          example: "SENT"
        accountId:
          type: string
          example: "ACC-001"
        retryCount:
          type: integer
          description: Number of retry attempts made
          example: 0
        failureReason:
          type: string
          nullable: true
          description: Reason for last failure (null if not failed)
          example: null
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    HoldingResponse:
      type: object
      properties:
        accountId:
          type: string
          example: "ACC-001"
        isin:
          type: string
          example: "US0378331005"
        quantity:
          type: number
          example: 5000000.00
        updatedAt:
          type: string
          format: date-time

    PagedSettlementResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/SettlementResponse'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          example: 42
        totalPages:
          type: integer
          example: 3

    MqHealthResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: string
          enum: [OK, ERROR]
        message:
          type: string
        connectionClass:
          type: string
        jmsProviderName:
          type: string
        providerVersion:
          type: string

    MqTestMdbResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        correlationId:
          type: string
        status:
          type: string
          enum: [SENT, ERROR]
        message:
          type: string
        destination:
          type: string

    MqStatsResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        mdb:
          $ref: '#/components/schemas/MdbMetrics'
        reconciliation:
          $ref: '#/components/schemas/ReconciliationMetrics'
        queues:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/QueueStatus'

    ReconciliationMetrics:
      type: object
      description: MT548 reconciliation outcome counters (in-memory, reset on restart)
      properties:
        totalProcessed:
          type: integer
          format: int64
          description: Total MT548 replies processed
        totalMatched:
          type: integer
          format: int64
          description: Settlement confirmed (MATC/MACH status)
        totalFailed:
          type: integer
          format: int64
          description: Settlement rejected (REJT/NMAT/CANC status)
        totalPending:
          type: integer
          format: int64
          description: Settlement still pending
        totalUnknown:
          type: integer
          format: int64
          description: MT548 could not be parsed — requires manual review. Triggers webhook alert.
        totalUnmatched:
          type: integer
          format: int64
          description: No matching instruction found for incoming MT548
        lastProcessedAt:
          type: string
          format: date-time
          nullable: true
          description: ISO timestamp of last processed MT548
        lastUnknownAt:
          type: string
          format: date-time
          nullable: true
          description: ISO timestamp of last UNKNOWN status occurrence

    MdbMetrics:
      type: object
      properties:
        totalReceived:
          type: integer
          format: int64
          description: Total messages received by MDB since last restart
        totalSuccess:
          type: integer
          format: int64
          description: Total messages processed successfully
        totalFailed:
          type: integer
          format: int64
          description: Total messages that failed processing
        lastReceivedAt:
          type: string
          format: date-time
          nullable: true
          description: ISO timestamp of last received message
        lastSuccessAt:
          type: string
          format: date-time
          nullable: true
        lastFailedAt:
          type: string
          format: date-time
          nullable: true

    QueueStatus:
      type: object
      properties:
        currentDepth:
          type: integer
          description: Number of messages currently on the queue
        maxDepth:
          type: integer
          description: Maximum queue depth configured
        openInputCount:
          type: integer
          description: Number of handles open for input (consumers)
        openOutputCount:
          type: integer
          description: Number of handles open for output (producers)
        lastPutDateTime:
          type: string
          nullable: true
          description: Date/time of last message put (format YYYY-MM-DD HH:MM:SS)
        lastGetDateTime:
          type: string
          nullable: true
          description: Date/time of last message get (format YYYY-MM-DD HH:MM:SS)

    ReconciliationResult:
      type: object
      description: Result of comparing cached positions against the immutable ledger
      properties:
        reconciledAt:
          type: string
          format: date-time
          description: Timestamp when the reconciliation was performed
        type:
          type: string
          enum: [INCREMENTAL, DAILY_CLOSE]
          description: |
            INCREMENTAL — only checked positions with movements since last snapshot.
            DAILY_CLOSE — full scan of all positions, snapshot persisted as new baseline.
          example: "INCREMENTAL"
        totalPositions:
          type: integer
          description: Total number of distinct (account, isin) positions checked
          example: 5
        discrepancyCount:
          type: integer
          description: Number of positions where cached balance differs from ledger balance
          example: 1
        consistent:
          type: boolean
          description: True if all cached balances match ledger balances
          example: false
        discrepancies:
          type: array
          items:
            $ref: '#/components/schemas/PositionDiscrepancy'

    PositionDiscrepancy:
      type: object
      description: A single position where cached balance and ledger balance do not match
      properties:
        accountId:
          type: string
          example: "ACC-001"
        isin:
          type: string
          example: "US0378331005"
        cachedBalance:
          type: number
          description: Balance from BOND_HOLDING table (fast-lookup cache)
          example: 1000000.00
        ledgerBalance:
          type: number
          description: Balance computed from SECURITY_MOVEMENT entries (source of truth)
          example: 900000.00
        difference:
          type: number
          description: cachedBalance minus ledgerBalance
          example: 100000.00

    TranslationRequest:
      type: object
      required:
        - rawPayload
      properties:
        rawPayload:
          type: string
          description: Raw SWIFT FIN (MT) or ISO 20022 XML (MX) message payload
        targetStandard:
          type: string
          enum: [MT, MX]
          description: Target standard to translate to. If omitted, auto-translates to the opposite standard.

    TranslationResponse:
      type: object
      properties:
        sourceStandard:
          type: string
          enum: [MT, MX]
          description: Detected source message standard
          example: "MT"
        targetStandard:
          type: string
          enum: [MT, MX]
          description: Target message standard
          example: "MX"
        sourceMessageType:
          type: string
          description: Source message type identifier
          example: "MT541"
        targetMessageType:
          type: string
          description: Target message type identifier
          example: "sese.023.001.09"
        translatedPayload:
          type: string
          description: The translated message in the target format
        canonical:
          $ref: '#/components/schemas/CanonicalSummary'

    CanonicalSummary:
      type: object
      description: Summary of canonical settlement data extracted during translation
      properties:
        transactionId:
          type: string
          example: "TR-EXAMPLE-001"
        isin:
          type: string
          example: "US0378331005"
        settlementDate:
          type: string
          format: date
          example: "2026-05-15"
        quantity:
          type: number
          example: 1000000.00
        direction:
          type: string
          enum: [RECEIVE, DELIVER]
          example: "RECEIVE"
        counterpartyBic:
          type: string
          example: "GOLDUS33"
        safekeepingAccount:
          type: string
          example: "ACC-001"

    DetectionResponse:
      type: object
      properties:
        standard:
          type: string
          enum: [MT, MX]
          description: Detected message standard
          example: "MT"
        messageType:
          type: string
          description: Detected message type
          example: "MT541"
        tradeRef:
          type: string
          description: Extracted trade reference
          example: "TR-EXAMPLE-001"

    SwiftMessageResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        messageStandard:
          type: string
          enum: [MT, MX]
          description: Message standard (MT for FIN, MX for ISO 20022)
        messageType:
          type: string
          description: Message type (e.g. MT541, sese.023.001.09)
        direction:
          type: string
          enum: [OUTBOUND, INBOUND]
        rawPayload:
          type: string
          description: Raw message content (FIN text or XML)
        translated:
          type: boolean
          description: True if this is an auto-generated translation copy (not the primary message)
        parsedStatus:
          type: string
          nullable: true
          description: Parsed status code from inbound replies
        parsedReason:
          type: string
          nullable: true
        sequenceNo:
          type: integer
        createdAt:
          type: string
          format: date-time

    CounterpartyCapabilityRequest:
      type: object
      required:
        - bicCode
        - participantName
        - supportedStandard
        - preferredStandard
      properties:
        bicCode:
          type: string
          minLength: 8
          maxLength: 11
          description: BIC/SWIFT code of the counterparty
          example: "HSBCHKHHXXX"
        participantName:
          type: string
          maxLength: 100
          description: Human-readable counterparty name
          example: "HSBC Hong Kong"
        supportedStandard:
          type: string
          enum: [MT_ONLY, MX_ONLY, DUAL]
          description: |
            Which standards the counterparty can process:
            - MT_ONLY: only accepts SWIFT FIN messages
            - MX_ONLY: only accepts ISO 20022 XML
            - DUAL: accepts both formats
          example: "DUAL"
        preferredStandard:
          type: string
          enum: [MT, MX]
          description: Preferred standard when counterparty supports DUAL
          example: "MX"

    CounterpartyCapabilityResponse:
      type: object
      properties:
        bicCode:
          type: string
          example: "HSBCHKHHXXX"
        participantName:
          type: string
          example: "HSBC Hong Kong"
        supportedStandard:
          type: string
          enum: [MT_ONLY, MX_ONLY, DUAL]
          example: "DUAL"
        preferredStandard:
          type: string
          enum: [MT, MX]
          example: "MX"
        resolvedOutbound:
          type: string
          enum: [MT, MX]
          description: The actual format that will be sent to this counterparty (resolved from supported + preferred)
          example: "MX"
        effectiveDate:
          type: string
          format: date
          example: "2026-05-13"
        active:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        message:
          type: string
          example: "Validation failed"
        errors:
          type: array
          items:
            type: string
          example: ["isin: Invalid ISIN format"]
        timestamp:
          type: string
          format: date-time
